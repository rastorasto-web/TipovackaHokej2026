  .login-card p{color:var(--text-muted);font-size:14px;margin-bottom:24px}
  .login-players{display:flex;flex-direction:column;gap:8px}
  .login-player-btn{background:var(--surface-2);border:1px solid var(--border);padding:14px 18px;border-radius:10px;color:var(--text);font-size:15px;font-weight:600;cursor:pointer;text-align:left;transition:all .15s;font-family:'Source Sans 3',sans-serif}
  .login-player-btn:hover{background:var(--surface-3);border-color:var(--red-1)}
  .login-player-btn.admin-btn{margin-top:12px;background:var(--gray-1);border-color:var(--gray-2);text-align:center;font-size:13px;color:var(--text-muted)}
  .login-player-btn.admin-btn:hover{border-color:var(--red-1);color:var(--text)}
  .pin-overlay{position:fixed;inset:0;z-index:1001;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center}
  .pin-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px;max-width:340px;width:90%;text-align:center}
  .pin-card h3{font-family:'Oswald',sans-serif;font-size:20px;margin-bottom:16px;color:var(--red-1)}
  .pin-input{width:100%;padding:14px;background:var(--bg);border:2px solid var(--border);border-radius:10px;color:var(--text);font-size:20px;text-align:center;letter-spacing:8px;font-family:'Oswald',sans-serif}
  .pin-input:focus{outline:none;border-color:var(--red-1)}

  .pin-confirm{background:var(--red-1);border-color:var(--red-2);color:white}

  header h1{font-family:'Oswald',sans-serif;font-size:32px;font-weight:700;text-transform:uppercase;letter-spacing:2px;position:relative}

  .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}

  .topbar-role{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
  .topbar-actions{display:flex;gap:8px;flex-wrap:wrap}

  .filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}

  table.tbl tr:hover{background:var(--surface-2)}
  .lb tr:nth-child(1) td{background:rgba(230,0,0,.12)}
  .lb tr:nth-child(2) td{background:rgba(200,0,0,.08)}
  .lb tr:nth-child(3) td{background:rgba(170,0,0,.05)}

  // =========== HELPERS ===========
  function hashPin(p){let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0}return'h'+Math.abs(h)}
  function getMatchDT(m){const[h,mn]=m.time.split(':').map(Number);const d=new Date(m.date+'T00:00:00+02:00');d.setHours(h,mn,0,0);return d}
  function isLocked(m){return new Date()>=new Date(getMatchDT(m).getTime()-3600000)}
  function isSaved(pid,mid){const t=allTips[pid]&&allTips[pid][mid];return t&&t.lockedAt}
  function timeLeft(m){const d=new Date(getMatchDT(m).getTime()-3600000)-new Date();if(d<=0)return null;const h=Math.floor(d/36e5),mn=Math.floor((d%36e5)/6e4);if(h>24)return Math.ceil(h/24)+'d';if(h>0)return h+'h '+mn+'m';return mn+'m'}
  function teamH(c){if(c==='TBD')return'<span class="team" style="color:var(--text-muted)">TBD</span>';return`<span class="team">${flagImg(c)} ${TEAMS[c].name}</span>`}
  function getDays(){const d=[],s=new Set();MATCHES.forEach(m=>{if(!s.has(m.day)){s.add(m.day);d.push(m.day)}});return d}
  function initials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}

  function scoreTip(t,r){
    if(!r||r.regHome==null||r.regAway==null)return null;
    if(!t||t.regHome==null||t.regAway==null)return{regular:0,final:0,total:0};
    let reg=0,fin=0;
    if(t.regHome===r.regHome&&t.regAway===r.regAway)reg=5;
    else{const td=t.regHome-t.regAway,rd=r.regHome-r.regAway,tw=Math.sign(td),rw=Math.sign(rd);
      if(td===rd&&tw===rw&&tw!==0)reg=3;else if(td===0&&rd===0)reg=3;else if(tw===rw)reg=1}
    if(r.finalHome!=null&&r.finalAway!=null&&t.finalHome!=null&&t.finalAway!=null){
      if(t.finalHome===r.finalHome&&t.finalAway===r.finalAway)fin=3;
      else if(Math.sign(t.finalHome-t.finalAway)===Math.sign(r.finalHome-r.finalAway))fin=1}
    return{regular:reg,final:fin,total:reg+fin}
  }
  function stats(pid){
    let tot=0,cnt=0,eR=0,eF=0,w=0;
    for(const m of MATCHES){const r=results[m.id];if(!r||r.regHome==null)continue;cnt++;
      const t=(allTips[pid]&&allTips[pid][m.id])||{};const s=scoreTip(t,r);if(!s)continue;
      tot+=s.total;if(s.regular===5)eR++;if(s.final===3)eF++;if(s.regular===1)w++}
    return{total:tot,counted:cnt,exactReg:eR,exactFin:eF,winners:w}
  }

  function showPin(pid){
    const isA=pid==='admin',pl=isA?null:PLAYERS.find(p=>p.id===pid),has=allPins[pid];
    const title=isA?'Administrátor':pl.name;
    const sub=has?'Zadaj svoj 4-miestny PIN':'Nastav si nový 4-miestny PIN';
    document.getElementById('pin-screen').innerHTML=`
      <div class="pin-overlay"><div class="pin-card">
        <h3>${title}</h3>
        <p style="color:var(--text-muted);font-size:13px;margin-bottom:14px">${sub}</p>

        ${!has&&!isA?'<input type="password" class="pin-input" id="pinC" maxlength="4" placeholder="Potvrď PIN" inputmode="numeric" pattern="[0-9]*" autocomplete="off" style="margin-top:10px">':''}
        <div class="pin-error" id="pinE"></div>
        <div class="pin-actions">
          <button class="pin-cancel" id="pinX">Späť</button>
          <button class="pin-confirm" id="pinOK">${has||isA?'Prihlásiť':'Nastaviť PIN'}</button>
        </div>

        ${!has&&!isA?'<div class="pin-info">PIN si zapamätaj – bude potrebný pri každom prihlásení.</div>':''}
      </div></div>`;
    document.getElementById('pinF').focus();
    document.getElementById('pinX').addEventListener('click',()=>{document.getElementById('pin-screen').innerHTML=''});
    document.getElementById('pinOK').addEventListener('click',()=>doPin(pid));
    document.getElementById('pinF').addEventListener('keyup',e=>{if(e.key==='Enter')doPin(pid)});
  }

  async function doPin(pid){
    const pin=document.getElementById('pinF').value,err=document.getElementById('pinE');
    if(pin.length!==4||!/^\d{4}$/.test(pin)){err.textContent='PIN musí mať 4 číslice';return}
    if(pid==='admin'){if(pin!==ADMIN_PIN){err.textContent='Nesprávny PIN';return}
      currentUser={id:'admin',name:'Administrátor',isAdmin:true};currentTab='results';finish();return}
    if(allPins[pid]){if(hashPin(pin)!==allPins[pid]){err.textContent='Nesprávny PIN';return}}
    else{const c=document.getElementById('pinC');if(c&&c.value!==pin){err.textContent='PINy sa nezhodujú';return}
      await db.ref('pins/'+pid).set(hashPin(pin))}
    currentUser={id:pid,name:PLAYERS.find(p=>p.id===pid).name,isAdmin:false};currentTab='tips';finish();
  }
  function finish(){document.getElementById('pin-screen').innerHTML='';document.getElementById('login-screen').innerHTML='';document.getElementById('app-main').style.display='';render()}

  function filt(m){if(dayFilter!=='all'&&m.day!==dayFilter)return false;if(groupFilter==='all')return true;if(groupFilter==='PO')return['QF','SF','BRONZE','GOLD'].includes(m.group);return m.group===groupFilter}

        </div>`).join('')}`}

  function rOV(){
    return`<div class="info-banner">Prehľad uložených tipov všetkých hráčov — aktualizuje sa v reálnom čase.</div>
      ${MATCHES.map(m=>{
        const po=['QF','SF','BRONZE','GOLD'].includes(m.group);
        const gb=po?`<span class="group-badge po">${m.label||m.group}</span>`:`<span class="group-badge">Sk. ${m.group}</span>`;
        const r=results[m.id];
        const rS=(r&&r.regHome!=null)?`<span class="real-result">${r.regHome}:${r.regAway}${(r.finalHome!=null&&(r.finalHome!==r.regHome||r.finalAway!==r.regAway))?` (kon. ${r.finalHome}:${r.finalAway})`:''}</span>`:'';
        const rows=PLAYERS.map(p=>{
          const t=(allTips[p.id]&&allTips[p.id][m.id])||{};if(!t.lockedAt)return null;
          const reg=(t.regHome!=null&&t.regAway!=null)?`${t.regHome}:${t.regAway}`:'—';
          const fin=(t.finalHome!=null&&t.finalAway!=null)?`${t.finalHome}:${t.finalAway}`:'—';
          const sc=scoreTip(t,r);
          const pts=(sc&&r&&r.regHome!=null)?`<span class="points-earned ${sc.total===0?'points-zero':''}">+${sc.total}</span>`:'—';
          return`<tr><td>${p.name}</td><td>${reg}</td><td>${fin}</td><td style="text-align:center">${pts}</td></tr>`}).filter(Boolean);
        if(!rows.length)return'';
        return`<div class="day-section">
          <div class="day-header" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--gray-1)">
            ${teamH(m.home)} <span class="vs">–</span> ${teamH(m.away)} ${gb} ${rS}
            <span style="color:var(--text-muted);font-size:12px;margin-left:8px">${m.day} · ${m.time}</span>
          </div>
          <div style="padding:12px 18px;overflow-x:auto">
            <table class="tbl"><thead><tr><th>Tipujúci</th><th>Riadny čas</th><th>Konečný</th><th style="text-align:center">Body</th></tr></thead>
            <tbody>${rows.join('')}</tbody></table>
          </div></div>`}).join('')||'<div style="padding:20px;color:var(--text-muted);text-align:center">Zatiaľ žiadne uložené tipy.</div>'}`}

  function rRules(){
    return`
      <div class="stats-card"><h3>📋 Ako to funguje</h3>
        <p style="line-height:1.8;color:var(--text-soft);font-size:14px">
        1. Prihlás sa svojím menom a 4-miestnym PINom (prvýkrát si ho nastavíš).<br>
        2. Pre každý zápas zadáš <strong>riadny čas</strong> (60 min) a <strong>konečný výsledok</strong>.<br>
        3. Tip uložíš tlačidlom <strong>„Uložiť tip"</strong> — po uložení ho <strong>nie je možné zmeniť</strong>.<br>
        4. Tip musíš uložiť <strong>najneskôr 1 hodinu pred zápasom</strong>.<br>
        5. Administrátor po zápase zadá reálny výsledok → body sa prepočítajú automaticky pre všetkých.<br><br>
        🟢 <strong>Všetky dáta sa synchronizujú v reálnom čase</strong> — netreba nič exportovať/importovať.</p></div>
      <div class="stats-card"><h3>🏆 Bodovací systém</h3>
        <table class="tbl"><thead><tr><th>Presnosť tipu</th><th style="text-align:center">Body</th></tr></thead><tbody>
        <tr><td>Presný výsledok riadneho času</td><td style="text-align:center"><strong style="color:var(--red-1);font-size:16px">5 b</strong></td></tr>
        <tr><td>Správny rozdiel gólov + víťaz</td><td style="text-align:center"><strong style="color:var(--red-1);font-size:16px">3 b</strong></td></tr>
        <tr><td>Presná remíza (3:3 vs 2:2)</td><td style="text-align:center"><strong style="color:var(--red-1);font-size:16px">3 b</strong></td></tr>
        <tr><td>Iba správny víťaz (1/X/2)</td><td style="text-align:center"><strong style="color:var(--red-1);font-size:16px">1 b</strong></td></tr>
        <tr><td><strong>BONUS:</strong> Presný konečný výsledok</td><td style="text-align:center"><strong style="color:var(--red-1);font-size:16px">+3 b</strong></td></tr>
        <tr><td><strong>BONUS:</strong> Správny víťaz po predĺžení</td><td style="text-align:center"><strong style="color:var(--red-1);font-size:16px">+1 b</strong></td></tr>
        </tbody></table>
        <p style="margin-top:12px;color:var(--text-muted);font-size:12px">Max za zápas: <strong>8 bodov</strong>.</p></div>
      <div class="stats-card"><h3>📊 Skupiny</h3>
        <p style="margin-bottom:8px;color:var(--text-soft)"><strong>Skupina A (Zürich):</strong></p>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">
          ${GROUP_A.map(c=>`<span style="display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);padding:6px 12px;border-radius:6px;font-size:13px;border:1px solid var(--border)">${flagImg(c)} ${TEAMS[c].name}</span>`).join('')}</div>
        <p style="margin-bottom:8px;color:var(--text-soft)"><strong>Skupina B (Fribourg):</strong></p>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${GROUP_B.map(c=>`<span style="display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);padding:6px 12px;border-radius:6px;font-size:13px;border:1px solid var(--border)">${flagImg(c)} ${TEAMS[c].name}</span>`).join('')}</div>
      </div>`}

  // =========== EVENTS ===========
  function bindEvents(){
    document.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',()=>{if(p.dataset.f==='day')dayFilter=p.dataset.v;if(p.dataset.f==='group')groupFilter=p.dataset.v;render()}));

    // Save tip
    document.querySelectorAll('[data-save]').forEach(b=>b.addEventListener('click',async()=>{
      const mid=b.dataset.save,pid=currentUser.id,m=MATCHES.find(x=>x.id===mid);
      if(isLocked(m)){alert('Zápas je už uzavretý.');return}
      const row=b.closest('.match'),inputs=row.querySelectorAll('.tip-input'),v={};
      inputs.forEach(i=>{v[i.dataset.f]=i.value===''?null:Number(i.value)});
      if(v.regHome==null||v.regAway==null){alert('Vyplň aspoň výsledok riadneho času.');return}
      if(!confirm(`Uložiť tip ${v.regHome}:${v.regAway} (riadny) / ${v.finalHome??v.regHome}:${v.finalAway??v.regAway} (konečný)?\n\nPo uložení ho už nebude možné zmeniť!`))return;
      await db.ref('tips/'+pid+'/'+mid).set({
        regHome:v.regHome,regAway:v.regAway,
        finalHome:v.finalHome??v.regHome,finalAway:v.finalAway??v.regAway,
        lockedAt:new Date().toISOString()
      });
    }));

    // Results (admin)
    document.querySelectorAll('.result-input').forEach(i=>i.addEventListener('change',async e=>{
      const mid=e.target.dataset.m,f=e.target.dataset.f,v=e.target.value===''?null:Number(e.target.value);
      if(v===null){await db.ref('results/'+mid+'/'+f).remove()}
      else{await db.ref('results/'+mid+'/'+f).set(v)}
      e.target.style.borderColor='var(--green)';setTimeout(()=>{e.target.style.borderColor=''},500);
    }));

    document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',async()=>{
      if(confirm('Vymazať výsledok?'))await db.ref('results/'+b.dataset.del).remove();
    }));

    document.getElementById('logB')?.addEventListener('click',()=>{currentUser=null;showLogin()});
  }

  // =========== INIT ===========
  setupListeners();
})();
</script>
</body>
</html>
